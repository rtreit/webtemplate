<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
    {{- partial "head.html" . -}}
</head>
<body>
    {{- partial "nav.html" . -}}
    <main class="site-main">
        {{- block "main" . }}{{ end -}}
    </main>
    {{- partial "footer.html" . -}}

    {{ $js := resources.Get "js/main.js" | minify | fingerprint }}
    <script src="{{ $js.RelPermalink }}" defer></script>
</body>
</html>
